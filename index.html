<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Copones BV · Pádel</title>
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Copones BV" />
<link rel="manifest" href='data:application/manifest+json,{"name":"Copones Buena Vista","short_name":"Copones BV","start_url":".","display":"standalone","background_color":"%230a0a0a","theme_color":"%230a0a0a","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 fill=%22%23d50a0a%22/%3E%3Ctext x=%2296%22 y=%22130%22 font-size=%22110%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22Arial%22 font-weight=%22bold%22%3ECB%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}' />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎾%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d; --bg2:#121317; --card:#16181d; --card2:#1d2027; --line:#2a2e37;
    --txt:#f4f6fa; --muted:#98a0ad; --red:#e2102a; --red2:#ff3350;
    --A:#f5c518; --B:#2f7bff; --C:#fb923c; --D:#a78bfa;
    --gold:#ffd34d; --spoon:#8a8f99;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(680px 460px at 6% 3%, rgba(245,197,24,.07), transparent 62%),
      radial-gradient(680px 460px at 94% 8%, rgba(47,123,255,.10), transparent 62%),
      radial-gradient(760px 560px at 88% 94%, rgba(251,146,60,.07), transparent 62%),
      radial-gradient(760px 560px at 10% 90%, rgba(167,139,250,.07), transparent 62%),
      var(--bg);
    background-attachment:fixed;
    color:var(--txt);font-family:"Inter",system-ui,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:76px}
  body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;
    background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:46px 46px}
  .ticker,.rainbow,.wrap{position:relative;z-index:1}
  h1,h2,h3,.anton{font-family:"Anton",Impact,sans-serif;font-weight:400;letter-spacing:.01em}
  .cond{font-family:"Barlow Condensed",sans-serif}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:720px;margin:0 auto;padding:0 14px}

  /* Top bar ESPN */
  .top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#000,#0a0b0d);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .topin{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:9px 14px}
  .brandmark{background:linear-gradient(135deg,var(--red),var(--C) 90%);color:#fff;font-family:"Anton";font-size:18px;padding:4px 9px;border-radius:5px;letter-spacing:.02em;line-height:1;box-shadow:0 2px 10px rgba(226,16,42,.35)}
  .brandtxt{font-family:"Anton";font-size:19px;letter-spacing:.02em;line-height:1}
  .brandtxt small{display:block;font-family:"Barlow Condensed";font-weight:600;font-size:11px;letter-spacing:.32em;color:var(--muted)}
  .live{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:"Barlow Condensed";font-weight:700;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--red2);box-shadow:0 0 0 0 rgba(255,51,80,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,51,80,.55)}70%{box-shadow:0 0 0 8px rgba(255,51,80,0)}100%{box-shadow:0 0 0 0 rgba(255,51,80,0)}}

  /* ticker */
  .ticker{background:#000;border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap}
  .ticker .run{display:inline-block;padding:6px 0;font-family:"Barlow Condensed";font-weight:600;font-size:13px;letter-spacing:.06em;color:var(--muted);animation:scroll 26s linear infinite}
  .ticker .run b{color:var(--txt)} .ticker .run .rd{color:var(--red2)}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  section{padding:16px 0 6px}
  .sechead{display:flex;align-items:center;gap:10px;margin:2px 0 12px}
  .sechead .bar{width:5px;height:22px;background:linear-gradient(180deg,var(--A),var(--C),var(--red));border-radius:2px}
  .sechead h2{font-size:23px}
  .sechead .sub{margin-left:auto;font-family:"Barlow Condensed";font-weight:600;color:var(--muted);font-size:13px;letter-spacing:.1em;text-transform:uppercase}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .card + .card{margin-top:12px}
  .pad{padding:14px}

  /* hero result */
  .hero{background:linear-gradient(135deg,#241a2e,#151019 55%,#101622);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden}
  .hero:before{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;background:radial-gradient(circle,rgba(226,16,42,.28),transparent 70%);pointer-events:none}
  .hero:after{content:"";position:absolute;left:-30px;bottom:-45px;width:150px;height:150px;background:radial-gradient(circle,rgba(47,123,255,.2),transparent 70%);pointer-events:none}
  .hero .lbl{font-family:"Barlow Condensed";font-weight:700;letter-spacing:.16em;font-size:12px;color:var(--red2);text-transform:uppercase}
  .hero .date{font-family:"Barlow Condensed";color:var(--muted);font-size:13px;font-weight:600}
  .champ{display:flex;align-items:center;gap:12px;margin-top:8px}
  .champ .cup{font-size:34px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-4px) rotate(4deg)}}
  .champ .names{font-family:"Anton";font-size:26px;line-height:1}
  .champ .names small{display:block;font-family:"Barlow Condensed";font-weight:600;font-size:12px;letter-spacing:.14em;color:var(--muted);margin-top:4px}

  /* stat pills row */
  .pills{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .pill .n{font-family:"Anton";font-size:30px;line-height:1}
  .pill .k{font-family:"Barlow Condensed";font-weight:600;font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .rainbow{height:3px;background:linear-gradient(90deg,var(--A),var(--C),var(--red),var(--D),var(--B))}
  .pills .pill:nth-child(1){border-top:3px solid var(--A)}
  .pills .pill:nth-child(2){border-top:3px solid var(--C)}
  .pills .pill:nth-child(3){border-top:3px solid var(--B)}
  .pills .pill:nth-child(1) .n{color:var(--A)}
  .pills .pill:nth-child(2) .n{color:var(--C)}
  .pills .pill:nth-child(3) .n{color:var(--B)}

  /* tables / standings */
  table{width:100%;border-collapse:collapse}
  .stand th{font-family:"Barlow Condensed";font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:right;padding:9px 8px;border-bottom:1px solid var(--line)}
  .stand th:first-child,.stand td:first-child{text-align:left}
  .stand td{padding:10px 8px;border-bottom:1px solid var(--line);font-size:15px}
  .stand tr:last-child td{border-bottom:0}
  .stand tbody tr:nth-child(odd){background:rgba(255,255,255,.015)}
  .rk{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:var(--card2);font-family:"Anton";font-size:13px;color:var(--muted);margin-right:9px}
  .rk.g1{background:var(--gold);color:#111}.rk.g2{background:#c9ccd4;color:#111}.rk.g3{background:#cd7f43;color:#111}
  .pname{font-weight:700;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
  .big{font-family:"Anton";font-size:18px}
  .cA{color:var(--A)}.cB{color:var(--B)}.cC{color:var(--C)}.cD{color:var(--D)}
  .cchip{display:inline-block;min-width:18px;text-align:center;font-family:"Anton";font-size:11px;padding:1px 5px;border-radius:5px;color:#0a0b0d}
  .chA{background:var(--A)}.chB{background:var(--B);color:#fff}.chC{background:var(--C)}.chD{background:var(--D)}.ch0{background:#3a3f49;color:#aeb4bf}

  /* segmented */
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px;margin-bottom:12px}
  .seg button{flex:1;background:transparent;border:0;color:var(--muted);font-family:"Barlow Condensed";font-weight:700;font-size:15px;letter-spacing:.04em;padding:9px 6px;border-radius:8px;cursor:pointer;text-transform:uppercase}
  .seg button.on{background:var(--red);color:#fff}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:#fff;border:0;border-radius:11px;padding:13px 18px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:var(--card2);border:1px solid var(--line);color:var(--txt)}
  .btn.block{width:100%}
  .btn.sm{padding:9px 12px;font-size:13px;border-radius:9px}

  /* jugadores grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .jcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px;cursor:pointer;position:relative;overflow:hidden}
  .jcard .av{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:"Anton";font-size:18px;color:#0a0b0d;margin-bottom:8px}
  .jcard .jn{font-weight:800;font-size:16px;line-height:1.1}
  .jcard .jm{font-family:"Barlow Condensed";font-weight:600;color:var(--muted);font-size:12.5px;letter-spacing:.04em;margin-top:3px}
  .jcard .jstat{display:flex;gap:12px;margin-top:9px}
  .jcard .jstat div{font-family:"Barlow Condensed"}
  .jcard .jstat b{font-family:"Anton";font-size:17px;display:block;line-height:1}
  .jcard .jstat span{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

  /* profile */
  .phead{display:flex;align-items:center;gap:14px}
  .phead .pav{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:"Anton";font-size:28px;color:#0a0b0d}
  img.pav{object-fit:cover;border:1px solid var(--line)}
  .kiagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:8px}
  .kiagrid figure{margin:0}
  .kiagrid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
  .kiagrid figcaption{font-family:"Barlow Condensed";font-weight:600;font-size:12px;color:var(--muted);margin-top:3px;text-align:center}
  .phead .pn{font-family:"Anton";font-size:30px;line-height:1}
  .phead .pm{font-family:"Barlow Condensed";font-weight:600;color:var(--muted);letter-spacing:.06em;margin-top:4px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px}
  .row:last-child{border-bottom:0}
  .row .muted{color:var(--muted)}
  .tag{font-family:"Barlow Condensed";font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

  /* sorteo */
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-family:"Barlow Condensed";font-weight:700;font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  input,select,textarea{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:16px;font-weight:600}
  input:focus,select:focus{outline:none;border-color:var(--red)}
  .pairwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--red);border-radius:12px;padding:12px;position:relative}
  .pcard .no{position:absolute;top:9px;right:12px;font-family:"Anton";font-size:20px;color:#3a3f49}
  .pl{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:4px 0}
  .pl.swapable{cursor:pointer;border-radius:8px;padding:4px 6px;margin:0 -6px;transition:.12s}
  .pl.swapable:active{transform:scale(.97)}
  .pl.swapsel{outline:2px dashed var(--A);outline-offset:1px;background:rgba(245,197,24,.12)}
  .amp{color:var(--muted);font-family:"Anton";font-size:15px;padding-left:2px}
  .sortcols{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  @media(max-width:700px){.sortcols{grid-template-columns:repeat(2,1fr)}}
  .sortcol{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px;border-top:3px solid var(--cc,#444)}
  .co-A{--cc:var(--A)}.co-B{--cc:var(--B)}.co-C{--cc:var(--C)}.co-D{--cc:var(--D)}.co-S{--cc:#22c55e}
  .sortcol .sh{font-family:"Anton";font-size:15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;color:var(--cc,#ccc)}
  .sortcol .sh small{font-family:"Inter";font-weight:700;font-size:11px;color:var(--muted)}
  .ptoggle{display:block;width:100%;text-align:center;background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 6px;margin-bottom:6px;font-weight:700;font-size:13px;cursor:pointer;transition:.12s;font-family:inherit}
  .ptoggle:last-child{margin-bottom:0}
  .ptoggle.on{color:#0a0b0d;border-color:transparent}
  .ptoggle.on.k-A{background:var(--A)}.ptoggle.on.k-B{background:var(--B);color:#fff}.ptoggle.on.k-C{background:var(--C)}.ptoggle.on.k-D{background:var(--D);color:#0a0b0d}.ptoggle.on.k-S{background:#22c55e;color:#0a0b0d}
  .plcols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:820px){.plcols{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:460px){.plcols{grid-template-columns:1fr}}
  .plcol{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;border-top:3px solid var(--cc,#444)}
  .plhead{font-family:"Anton";font-size:13px;letter-spacing:.03em;color:var(--cc,#ccc);margin-bottom:10px;display:flex;align-items:center;gap:7px;text-transform:uppercase}
  .plcard{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:7px;cursor:pointer;transition:.12s}
  .plcard:hover{border-color:var(--cc,#888);transform:translateX(2px)}
  .plcard:last-child{margin-bottom:0}
  .pln{font-weight:800;font-size:14.5px;line-height:1.15}
  .pchamp{color:var(--gold);font-size:12px;font-weight:700}
  .plr{font-family:"Barlow Condensed";font-weight:600;color:var(--muted);font-size:12px;letter-spacing:.02em;margin-top:2px}
  .pls{font-family:"Barlow Condensed";font-weight:700;color:var(--cc,#888);font-size:10.5px;margin-top:5px;text-transform:uppercase;letter-spacing:.07em}
  .co-inv{--cc:#7a828f}

  .note{color:var(--muted);font-size:13px;line-height:1.55}
  .warn{color:#ffcf4d;font-weight:700}
  .empty{color:var(--muted);text-align:center;padding:26px 10px}

  /* admin list edit */
  .adline{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:6px}
  .adline .an{flex:1;font-weight:600}
  .adline select{padding:6px 8px;font-size:13px}
  .adline button{background:transparent;border:0;color:var(--muted);font-size:16px;cursor:pointer}

  /* bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(10,11,13,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .navin{max-width:720px;margin:0 auto;display:flex}
  .nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;color:var(--muted);font-family:"Barlow Condensed";font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .nav a .ic{font-size:19px;line-height:1}
  .nav a.on{color:var(--txt)}
  .nav a.on .ic{filter:drop-shadow(0 0 8px rgba(226,16,42,.8))}
  .nav a.on:after{content:"";position:absolute;top:0;width:26px;height:3px;background:var(--red);border-radius:0 0 3px 3px}
  .nav a{position:relative}

  .hidden{display:none}
  .toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#000;border:1px solid var(--line);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;font-size:14px;z-index:80;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}

  /* ===== MODALES PROPIOS (chau prompts del navegador) ===== */
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
  .modal-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.68);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fadein .15s}
  .modal-card{background:var(--card);border:1px solid var(--line);border-radius:18px 18px 0 0;max-width:520px;width:100%;max-height:84vh;overflow-y:auto;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));animation:slideup .2s ease}
  @media(min-width:560px){.modal-ov{align-items:center;padding:16px}.modal-card{border-radius:18px}}
  .modal-t{font-family:"Anton",Impact,sans-serif;font-size:21px;margin-bottom:4px}
  .modal-s{color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:12px}
  .mopt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:14px;margin-bottom:8px;font-weight:800;font-size:15.5px;cursor:pointer;font-family:inherit;min-height:48px;transition:.1s}
  .mopt:active{transform:scale(.98)}
  .mopt small{display:block;color:var(--muted);font-weight:600;font-size:12px;margin-top:2px}
  .mopt.on{background:var(--red);border-color:var(--red);color:#fff}
  .mopt.on small{color:rgba(255,255,255,.75)}
  .mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
  .mgrid .mopt{margin-bottom:0;text-align:center}
  .mok{display:block;width:100%;background:var(--red);border:0;color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:15.5px;cursor:pointer;font-family:inherit;margin-top:4px;min-height:48px}
  .mcancel{display:block;width:100%;background:transparent;border:0;color:var(--muted);padding:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .mx{flex:none;width:36px;height:36px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:15px;font-weight:800;cursor:pointer;line-height:1}
  .mx:active{transform:scale(.94)}

  /* ===== MODO PANTALLA (bolillero gigante) ===== */
  .bigshow{position:fixed;inset:0;z-index:120;background:radial-gradient(900px 600px at 50% -10%,#221016,#000 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;cursor:pointer;animation:fadein .2s;color:#fff}
  .bigshow .bs-brand{position:absolute;top:calc(14px + env(safe-area-inset-top));font-family:"Barlow Condensed";font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);font-size:min(3.4vw,14px)}
  .bigshow .bs-drum{font-size:min(20vw,120px);animation:bob 1s ease-in-out infinite}
  .bigshow .bs-name{font-family:"Anton",Impact,sans-serif;font-size:min(12vw,76px);color:var(--A);min-height:1.2em;margin-top:10px}
  .bigshow .bs-note{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));font-family:"Barlow Condensed";font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-size:min(3.4vw,14px)}

const COL={A:"chA",B:"chB",C:"chC",D:"chD","":"ch0"};
const COLtx={A:"cA",B:"cB",C:"cC",D:"cD","":""};

function realDe(n){const j=DATA.jugadores.find(x=>x.n===n);return j?(j.real||""):"";}

/* ================= HELPERS ================= */
function key(a,b){return [a,b].sort().join(" ‑ ");}
function coponDe(n){ const j=DATA.jugadores.find(x=>x.n===n); if(j)return j.c; return (DATA.bolsaCop&&DATA.bolsaCop[n])||""; }
async function pedirCopon(nombre){
  const v=await uiPick(`🎁 ¿Qué copón es ${esc(nombre)}?`,"Para que el sorteo lo empareje bien",[
    {label:`<span class="cchip chA">A</span> Crack`,value:"A"},

    {label:`<span class="cchip chD">D</span> Valiente`,value:"D"}
  ]);

}
function todosLosNombres(){
  const s=new Set(DATA.jugadores.map(j=>j.n));
  DATA.fechas.forEach(f=>f.parejas.forEach(p=>p.forEach(n=>s.add(n))));
  return [...s];
}
function allFechas(){ return [...DATA.fechas, ...((DATA.historial||[]).flatMap(t=>t.fechas||[]))].sort((a,b)=>b.f.localeCompare(a.f)); }
function eachFechaArr(d){ return [d.fechas||[], ...(((d&&d.historial)||[]).map(t=>t.fechas||[]))]; }
function statsInd(list){
  list=list||DATA.fechas;
  const m={};
  const get=n=>m[n]||(m[n]={n,pj:0,camp:0,pala:0,mvp:0,cafe:0,nocafe:0,cafeReg:0,comp:{}});
  list.forEach(f=>{
    const enFecha=new Set();
    f.parejas.forEach(team=>{
      team.forEach(n=>enFecha.add(n));
      team.forEach(a=>team.forEach(b=>{ if(a!==b) get(a).comp[b]=(get(a).comp[b]||0)+1; }));
    });
    enFecha.forEach(n=>get(n).pj++);
    if(f.campeon){f.campeon.forEach(n=>get(n).camp++);}
    if(f.pala){f.pala.forEach(n=>get(n).pala++);}
    if(f.mvp){get(f.mvp).mvp++;}
    // ☕ solo cuenta en fechas donde se registró el dato (sinCafe existe)
    if(Array.isArray(f.sinCafe)){
      enFecha.forEach(n=>{const g=get(n);g.cafeReg++;if(f.sinCafe.includes(n))g.nocafe++;else g.cafe++;});
    }
  });
  return m;
}
function statsPar(list){
  list=list||DATA.fechas;
  const m={};
  list.forEach(f=>{
    f.parejas.forEach(team=>{
      if(team.length!==2) return;
      const [a,b]=team;
      const k=key(a,b); const o=m[k]||(m[k]={a,b,veces:0,camp:0});
      o.veces++;
      if(f.campeon && f.campeon.length===2 && key(f.campeon[0],f.campeon[1])===k) o.camp++;
    });
  });
  return m;
}
function initials(n){return n.replace(/[^A-Za-zÀ-ÿ ]/g,"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase()||"?";}
function avatarColor(n){const cols=["#e2102a","#2f7bff","#fb923c","#22c55e","#a78bfa","#f5c518","#ff5da2","#14b8a6"];let h=0;for(const ch of n)h=(h*31+ch.charCodeAt(0))>>>0;return cols[h%cols.length];}
function fmtFecha(s){const [y,m,d]=s.split("-");const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return `${+d} ${ms[+m-1]} ${y}`;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1800);}

/* ---------- MODALES PROPIOS (reemplazan a prompt/confirm) ---------- */
function uiClose(){const m=document.getElementById("uimodal");if(m)m.remove();}
function uiShow(title,sub,inner){
  uiClose();
  const d=document.createElement("div");
  d.id="uimodal";d.className="modal-ov";
  d.innerHTML=`<div class="modal-card">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div class="modal-t" style="flex:1">${title}</div>
      <button class="mx" data-mx title="Cerrar">✕</button>
    </div>
    ${sub?`<div class="modal-s">${sub}</div>`:""}<div>${inner}</div></div>`;
  document.body.appendChild(d);
  // la ✕ equivale al botón de cancelar del modal (así cada flujo resuelve bien su promesa)
  d.querySelector("[data-mx]").onclick=()=>{const c=d.querySelector("[data-x]");if(c)c.click();else uiClose();};
  return d;
}
function uiPick(title,sub,options){ // options: [{label,sub?,value}] → Promise<value|undefined si cancela>
  return new Promise(res=>{
    const d=uiShow(title,sub,
      options.map((o,i)=>`<button class="mopt" data-i="${i}">${o.label}${o.sub?`<small>${o.sub}</small>`:""}</button>`).join("")+
      `<button class="mcancel" data-x>Cancelar</button>`);
    d.querySelectorAll(".mopt").forEach(b=>b.onclick=()=>{uiClose();res(options[+b.dataset.i].value);});
    d.querySelector("[data-x]").onclick=()=>{uiClose();res(undefined);};
    d.onclick=e=>{if(e.target===d){uiClose();res(undefined);}};
  });
}
function uiMulti(title,sub,names,okEmpty){ // selección múltiple → Promise<array|undefined>
  return new Promise(res=>{
    const sel=new Set();
    const d=uiShow(title,sub,
      `<div class="mgrid">${names.map((n,i)=>`<button class="mopt" data-i="${i}">${esc(n)}</button>`).join("")}</div>
      <button class="mok" data-ok>${okEmpty}</button>
      <button class="mcancel" data-x>Cancelar</button>`);
    const ok=d.querySelector("[data-ok]");
    d.querySelectorAll(".mopt").forEach(b=>b.onclick=()=>{
      const n=names[+b.dataset.i];
      if(sel.has(n)){sel.delete(n);b.classList.remove("on");}else{sel.add(n);b.classList.add("on");}
      ok.textContent=sel.size?`✓ Confirmar (${sel.size})`:okEmpty;
    });
    ok.onclick=()=>{uiClose();res([...sel]);};
    d.querySelector("[data-x]").onclick=()=>{uiClose();res(undefined);};
  });
}
function uiCafe(title,sub,names,iniSel){ // ☕/🏃 por jugador → Promise<array de rajados|undefined si "dejar como está">
  return new Promise(res=>{
    const sel=new Set(iniSel||[]);
    const d=uiShow(title,sub,
      `<div class="modal-s" style="margin-top:-4px">Todos arrancan en ☕ <b>se quedó</b>. Tocá a los que se fueron para pasarlos a 🏃.</div>
       <div class="mgrid">${names.map((n,i)=>`<button class="mopt cafeopt" data-i="${i}"></button>`).join("")}</div>
       <button class="mok" data-ok></button>
       <button class="mcancel" data-x>↩️ Dejar como está</button>`);
    const paint=()=>{
      d.querySelectorAll(".cafeopt").forEach(b=>{
        const n=names[+b.dataset.i];
        b.classList.toggle("on",sel.has(n));
        b.innerHTML=`${sel.has(n)?"🏃":"☕"} ${esc(n)}`;
        b.style.opacity=sel.has(n)?"1":".8";
      });
      d.querySelector("[data-ok]").textContent=sel.size?`✓ Guardar · 🏃 ${sel.size} sin café`:"✓ Guardar · ☕ se quedaron todos";
    };
    d.querySelectorAll(".cafeopt").forEach(b=>b.onclick=()=>{
      const n=names[+b.dataset.i];
      if(sel.has(n))sel.delete(n);else sel.add(n);
      if(navigator.vibrate)navigator.vibrate(8);
      paint();
    });
    paint();
    d.querySelector("[data-ok]").onclick=()=>{uiClose();res([...sel]);};
    d.querySelector("[data-x]").onclick=()=>{uiClose();res(undefined);};
  });
}
function uiConfirm(title,msg,okLabel,cancelLabel){ // → Promise<bool>
  return new Promise(res=>{
    const d=uiShow(title,msg,
      `<button class="mok" data-ok>${okLabel||"✓ Dale"}</button>
      <button class="mcancel" data-x>${cancelLabel||"Mejor no"}</button>`);
    d.querySelector("[data-ok]").onclick=()=>{uiClose();res(true);};
    d.querySelector("[data-x]").onclick=()=>{uiClose();res(false);};
    d.onclick=e=>{if(e.target===d){uiClose();res(false);}};
  });
}

function render(){
  const app=document.getElementById("app");
  if(CLOUD&&!USER&&VIEW!=="inicio"){app.innerHTML=vBloqueo();bind();renderTicker();return;}
  if(VIEW==="inicio")app.innerHTML=vInicio();
  else if(VIEW==="ranking")app.innerHTML=vRanking();
  else if(VIEW==="sorteo")app.innerHTML=vSorteo();
  else if(VIEW==="jugadores")app.innerHTML=vJugadores();
  else if(VIEW==="perfil")app.innerHTML=vPerfil(PARAM);
  else if(VIEW==="admin")app.innerHTML=vAdmin();
  bind();
  renderTicker();
}

function renderTicker(){
  const ind=statsInd();
  const arr=Object.values(ind);
  const topJ=[...arr].sort((a,b)=>b.pj-a.pj)[0];
  const topC=[...arr].sort((a,b)=>b.camp-a.camp)[0];
  const ult=DATA.fechas.find(f=>f.campeon)||DATA.fechas[0];
  let bits=[];
  if(ult&&ult.campeon)bits.push(`<span class="rd">🚗 SE LLEVARON EL KIA</span> ${esc(ult.campeon.join(" & "))}`);
  if(ult&&ult.mvp)bits.push(`<span class="rd">🎖️ MVP</span> <b>${esc(ult.mvp)}</b>`);
  if(ult&&ult.pala)bits.push(`<span class="rd">🥄 CUCHARA</span> ${esc(ult.pala.join(" & "))}`);
  if(topC&&topC.camp)bits.push(`<span class="rd">👑 MÁS KIAS</span> <b>${esc(topC.n)}</b> (${topC.camp})`);
  if(topJ)bits.push(`<span class="rd">🔥 MÁS PRESENTE</span> <b>${esc(topJ.n)}</b> (${topJ.pj} fechas)`);
  const topR=[...arr].sort((a,b)=>b.nocafe-a.nocafe)[0];
  if(topR&&topR.nocafe)bits.push(`<span class="rd">🏃 SE RAJA SIN CAFÉ</span> <b>${esc(topR.n)}</b> (${topR.nocafe})`);
  bits.push(`<b>${DATA.fechas.length}</b> fechas registradas`);
  bits.push(`<b>${todosLosNombres().length}</b> jugadores`);
  const line=bits.join(" &nbsp;•&nbsp; ");
  document.getElementById("ticker").innerHTML=line+" &nbsp;•&nbsp; "+line;
}

function miniRank(list,field){
  if(!list.length||!list.some(x=>x[field]))return `<div class="empty" style="padding:12px">Sin datos todavía</div>`;
  return `<table class="stand"><tbody>${list.map((p,i)=>`
    <tr><td><span class="rk ${i<3?'g'+(i+1):''}">${i+1}</span><span class="pname" data-perfil="${esc(p.n)}">${chip(p.n)} ${esc(p.n)}</span></td>
    <td style="text-align:right"><span class="big">${p[field]}</span></td></tr>`).join("")}</tbody></table>`;
}
function chip(n){const c=coponDe(n);return `<span class="cchip ${COL[c]}">${c||"·"}</span>`;}

/* ---------- RANKING ---------- */
let RKTAB="jug", RKSEASON="actual";
function seasonFechas(){
  if(RKSEASON==="todas")return allFechas();
  if(RKSEASON.startsWith("h")){const t=(DATA.historial||[])[+RKSEASON.slice(1)];return t?t.fechas:DATA.fechas;}
  return DATA.fechas;
}
function vRanking(){
  const hist=DATA.historial||[];
  return `<section>
    <div class="sechead"><span class="bar"></span><h2>Ranking</h2><span class="sub">${RKSEASON==="actual"?"Temporada en curso":RKSEASON==="todas"?"Histórico total":esc((hist[+RKSEASON.slice(1)]||{}).nombre||"")}</span></div>
    ${hist.length?`<select id="rkseason" style="width:100%;margin-bottom:10px">
      <option value="actual" ${RKSEASON==="actual"?"selected":""}>🎾 Temporada en curso</option>
      ${hist.map((t,i)=>`<option value="h${i}" ${RKSEASON==="h"+i?"selected":""}>🏁 ${esc(t.nombre)}</option>`).join("")}
      <option value="todas" ${RKSEASON==="todas"?"selected":""}>📚 Histórico total</option>
    </select>`:""}
    <div class="seg" id="rkseg">
      <button data-t="jug" class="${RKTAB==='jug'?'on':''}">Jugadores</button>
      <button data-t="par" class="${RKTAB==='par'?'on':''}">Parejas</button>
      <button data-t="prode" class="${RKTAB==='prode'?'on':''}">🎲 Adivinos</button>
    </div>
    <div class="card" id="rktable">${RKTAB==='jug'?tablaJug():RKTAB==='par'?tablaPar():tablaProde()}</div>
    <div class="note" style="margin-top:10px">PJ = fechas jugadas · 🚗 = Kias (campeonatos) · 🎖️ = MVP del día · 🥄 = cucharas de madera · ☕ = se quedó al café · 🏃 = se rajó sin café. Tocá un nombre para ver su perfil.</div>
  </section>`;
}
function tablaJug(){
  const orden=(a,b)=>b.camp-a.camp||b.pj-a.pj;
  const arr=Object.values(statsInd(seasonFechas())).sort(orden);
  if(!arr.length)return `<div class="empty">Sin datos</div>`;
  // 📈 movimiento vs. la semana pasada (sin la última fecha)
  const prevPos={};
  if(RKSEASON==="actual"&&DATA.fechas.length>1){
    Object.values(statsInd(DATA.fechas.slice(1))).sort(orden).forEach((p,i)=>prevPos[p.n]=i);
  }
  const mv=(n,i)=>{
    if(RKSEASON!=="actual")return "";
    if(prevPos[n]===undefined)return ' <small style="color:#4ade80;font-weight:800">🆕</small>';
    const d=prevPos[n]-i;
    if(d>0)return ` <small style="color:#4ade80;font-weight:800">▲${d}</small>`;
    if(d<0)return ` <small style="color:var(--red2);font-weight:800">▼${-d}</small>`;
    return ' <small style="color:var(--muted)">=</small>';
  };
  return `<table class="stand"><thead><tr><th>Jugador</th><th>PJ</th><th>🚗</th><th>🎖️</th><th>🥄</th><th>☕</th><th>🏃</th></tr></thead><tbody>
    ${arr.map((p,i)=>`<tr>
      <td><span class="rk ${i<3?'g'+(i+1):''}">${i+1}</span><span class="pname" data-perfil="${esc(p.n)}">${chip(p.n)} ${esc(p.n)}</span>${mv(p.n,i)}</td>
      <td style="text-align:right"><span class="big">${p.pj}</span></td>
      <td style="text-align:right;color:var(--gold);font-weight:800">${p.camp||"·"}</td>
      <td style="text-align:right;color:var(--A);font-weight:800">${p.mvp||"·"}</td>
      <td style="text-align:right;color:var(--spoon)">${p.pala||"·"}</td>
      <td style="text-align:right;color:#4ade80;font-weight:800">${p.cafe||"·"}</td>
      <td style="text-align:right;color:var(--red2);font-weight:800">${p.nocafe||"·"}</td>
    </tr>`).join("")}
  </tbody></table>`;
}
function tablaPar(){
  const arr=Object.values(statsPar(seasonFechas())).sort((a,b)=>b.camp-a.camp||b.veces-a.veces);
  if(!arr.length)return `<div class="empty">Sin datos</div>`;
  return `<table class="stand"><thead><tr><th>Pareja</th><th>Veces</th><th>🏆</th></tr></thead><tbody>
    ${arr.slice(0,40).map((p,i)=>`<tr>
      <td><span class="rk ${i<3?'g'+(i+1):''}">${i+1}</span> <b>${esc(p.a)}</b> <span class="amp">&</span> <b>${esc(p.b)}</b></td>
      <td style="text-align:right"><span class="big">${p.veces}</span></td>
      <td style="text-align:right;color:var(--gold);font-weight:800">${p.camp||"·"}</td>
    </tr>`).join("")}
  </tbody></table>`;
}

/* ---------- JUGADORES (grid) ---------- */
let PQ="";
function vJugadores(){
  const ind=statsInd(allFechas());
  const q=PQ.trim().toLowerCase();
  const match=(n,real)=>!q||n.toLowerCase().includes(q)||(real||"").toLowerCase().includes(q);
  const roster=new Set(DATA.jugadores.map(j=>j.n));
  const inv=todosLosNombres().filter(n=>!roster.has(n)&&n!=="Invitado"&&match(n,"")).sort();
  return `<section>
    <div class="sechead"><span class="bar"></span><h2>Plantel</h2><span class="sub">${DATA.jugadores.length} jugadores</span></div>
    <input id="psearch" placeholder="🔍 Buscar jugador o apodo…" value="${esc(PQ)}" style="width:100%;margin-bottom:12px">
    <div class="plcols">
      ${["A","B","C","D"].map(c=>{
        // los que más jugaron arriba
        const arr=DATA.jugadores.filter(j=>j.c===c&&match(j.n,j.real)).sort((a,b)=>(((ind[b.n]||{}).pj||0)-((ind[a.n]||{}).pj||0))||a.n.localeCompare(b.n));
        return `<div class="plcol co-${c}">
          <div class="plhead"><span class="cchip ${COL[c]}">${c}</span> ${COPTIT[c]}</div>
          ${arr.length?arr.map(j=>plcardHTML(j.n,j.real,ind[j.n])).join(""):'<div class="note" style="font-size:12px;padding:4px 2px">—</div>'}
        </div>`;
      }).join("")}
    </div>
    ${inv.length?`<div class="sechead" style="margin-top:20px"><span class="bar"></span><h2>Invitados</h2><span class="sub">${inv.length}</span></div>
      <div class="plcol co-inv">${inv.map(n=>plcardHTML(n,"invitado sorpresa",ind[n])).join("")}</div>`:""}
  </section>`;
}
function plcardHTML(n,real,s){
  s=s||{pj:0,camp:0};
  return `<div class="plcard" data-perfil="${esc(n)}">
    <div class="pln">${esc(n)}${s.camp?` <span class="pchamp">🏆${s.camp}</span>`:""}</div>

function looseNames(){ // nombres que aparecen en fechas pero no están en el plantel
  const roster=new Set(DATA.jugadores.map(j=>j.n));
  const s=new Set((DATA.bolsa||[]).filter(n=>!roster.has(n)));
  DATA.fechas.forEach(f=>{
    f.parejas.forEach(t=>t.forEach(n=>{if(!roster.has(n))s.add(n);}));
    if(f.mvp&&!roster.has(f.mvp))s.add(f.mvp);
  });
  return [...s].sort((a,b)=>a.localeCompare(b));
}
function allKnownNames(){
  const s=new Set(DATA.jugadores.map(j=>j.n));
  looseNames().forEach(n=>s.add(n));
  return [...s].sort((a,b)=>a.localeCompare(b));
}
function fechasDe(n){return DATA.fechas.filter(f=>f.parejas.some(t=>t.includes(n))).length;}

/* ---------- LECTOR DE LISTAS DE WHATSAPP ---------- */
const RX_ACENTOS=new RegExp("["+String.fromCharCode(0x0300)+"-"+String.fromCharCode(0x036f)+"]","g");
const RX_INVISIBLES=new RegExp("["+String.fromCharCode(0x200b)+"-"+String.fromCharCode(0x200f)+String.fromCharCode(0x2060)+"-"+String.fromCharCode(0x2063)+String.fromCharCode(0xfeff)+String.fromCharCode(0x00a0)+"]","g");
function normName(s){return String(s).toLowerCase().normalize("NFD").replace(RX_ACENTOS,"").replace(/[^a-z0-9]/g,"");}
function lev1(a,b){ // ¿difieren en una sola letra? (tolerancia de tipeo)
  if(a===b)return true;
  if(Math.abs(a.length-b.length)>1)return false;
  let i=0,j=0,ed=0;
  while(i<a.length&&j<b.length){
    if(a[i]===b[j]){i++;j++;continue;}
    ed++; if(ed>1)return false;
    if(a.length>b.length)i++; else if(b.length>a.length)j++; else{i++;j++;}
  }
  return ed+(a.length-i)+(b.length-j)<=1;
}
function playerTokens(j){
  const t=new Set([normName(j.n)]);
  j.n.split(/[\s()\/·]+/).forEach(w=>{if(w.length>2)t.add(normName(w));});
  (j.real||"").split("·").forEach(a=>{const na=normName(a);if(na)t.add(na);a.split(/\s+/).forEach(w=>{if(w.length>2)t.add(normName(w));});});
  return t;
}
function matchPlayer(raw){
  const q=normName(raw); if(!q||q.length<2)return null;
  // 1º: coincidencia exacta (nombre o apodo)
  for(const j of DATA.jugadores){ if(playerTokens(j).has(q)) return j.n; }
  for(const n of looseNames()){ if(normName(n)===q) return n; }
  // 2º: tolerancia de una letra (Emma≈Ema)
  if(q.length>=3){
    for(const j of DATA.jugadores){ for(const t of playerTokens(j)){ if(t.length>=3&&lev1(t,q)) return j.n; } }
    for(const n of looseNames()){ const t=normName(n); if(t.length>=3&&lev1(t,q)) return n; }
  }
  return null;
}
function cleanLine(l){
  return String(l).replace(RX_INVISIBLES," ")
    .replace(/^\s*\d+\s*[\.\)\-–—]?\s*/,"")
    .replace(/\(\*+\)|\*+/g,"")
    .replace(/[✅🎾🥎👍✔️]/g,"")
    .trim();
}
function esEncabezado(l){ return !l || /^(domingo|sabado|sábado|lista|convocados|padel|pádel)/i.test(l) || /\d{1,2}\/\d{1,2}/.test(l) || !/[a-záéíóúñ]/i.test(l); }

function parseCafe(s){ // "Chuck, Toto" → nombres reconocidos; "" → todos se quedaron
  const t=(s||"").trim(); if(!t)return [];
  return t.split(/\s*(?:,|\/|&|\+|-|–|—)\s*|\s+y\s+/i).map(x=>x.trim()).filter(Boolean).map(x=>matchPlayer(x)||x);
}
function faltantesDe(f){ // qué datos le faltan a una fecha ("nadie" se guarda como false, así no se vuelve a preguntar)
  const faltan=[];

  if(!Array.isArray(f.sinCafe))faltan.push("cafe");

}

async function cargarResultado(f){
  // Se puede cargar Y corregir CUALQUIER dato de CUALQUIER fecha (también para atrás).
  // Cada pregunta trae "↩️ Dejar como está": cancelar o dejar no aborta el resto.
  const completa=!faltantesDe(f).length;
  const antes={campeon:f.campeon||null,pala:(f.pala===undefined?null:f.pala),mvp:(f.mvp===undefined?null:f.mvp),sinCafe:Array.isArray(f.sinCafe)?f.sinCafe.slice():null};
  if(completa){ // ya está todo: corregir = reescribir la historia, con respaldo
    if(!await uiConfirm("🕰️ ¡Momento!",`La fecha del <b>${fmtFecha(f.f)}</b> ya está completa y estás por <b>reescribir la historia</b>.<br><br>Tranqui: la versión actual queda guardada en el historial de cambios, con fecha y autor. Acá nada se pierde… pero todo se sabe 😏`,"✍️ Le entramos"))return;
  }
  const dia=fmtFecha(f.f);
  const KEEP={dejar:true}; // valor especial: "dejar como está"
  const parejasOpt=f.parejas.map((p,i)=>({label:`${i+1}) ${esc(p.join(" & "))}`,value:p}));
  const jugadores=[...new Set(f.parejas.flat())];
  const keepOpt=txt=>({label:`↩️ Dejar como está <small style="opacity:.8">(${txt})</small>`,value:KEEP});
  let cambios=0, salir=false; // ✕ / Cancelar / tocar afuera = salir del flujo (lo ya respondido se guarda)

  // 🚗 Campeón
  if(!salir){
    const actual=f.campeon?esc(f.campeon.join(" & ")):"sin cargar";
    const v=await uiPick("🚗 ¿Quién se llevó el Kia?",`Fecha del ${dia} · tocá la pareja campeona`,
      [keepOpt(actual),...parejasOpt,{label:"🤷 Sin campeón todavía",value:null}]);
    if(v===undefined)salir=true;
    else if(v!==KEEP){f.campeon=v;cambios++;}
  }
  // 🥄 Cuchara
  if(!salir){
    const actual=f.pala?esc(f.pala.join(" & ")):(f.pala===false?"nadie / no hubo":"sin cargar");
    const v=await uiPick("🥄 ¿Y la cuchara de madera?",`Fecha del ${dia} · la pareja que la pasó peor`,
      [keepOpt(actual),...parejasOpt,{label:"🤷 Nadie / no hubo",value:false}]);
    if(v===undefined)salir=true;
    else if(v!==KEEP){f.pala=v;cambios++;}
  }
  // 🎖️ MVP
  if(!salir){
    const actual=f.mvp?esc(f.mvp):(f.mvp===false?"nadie / no hubo":"sin cargar");
    const v=await uiPick("🎖️ ¿MVP del día?",`Fecha del ${dia} · el que la rompió`,
      [keepOpt(actual),...jugadores.map(n=>({label:esc(n),value:n})),{label:"🤷 Nadie / no hubo",value:false}]);
    if(v===undefined)salir=true;
    else if(v!==KEEP){f.mvp=v;cambios++;}
  }
  // ☕ Café (fichas ☕/🏃 por jugador, arranca con lo ya cargado)
  if(!salir){
    const v=await uiCafe("☕ ¿Quiénes se quedaron al café?",`Fecha del ${dia}`,jugadores,Array.isArray(f.sinCafe)?f.sinCafe:[]);
    if(v!==undefined&&JSON.stringify([...v].sort())!==JSON.stringify(Array.isArray(f.sinCafe)?[...f.sinCafe].sort():null)){f.sinCafe=v;cambios++;}
  }

  if(!cambios){toast(salir?"Saliste sin cambios":"No cambiaste nada — quedó todo como estaba");return;}
  if(completa){ // respaldo: versión anterior + quién la cambió
    (f.versiones||(f.versiones=[])).push({ts:Date.now(),por:(USER&&USER.email)||"admin (este dispositivo)",antes});
  }
  f.confirmada=true; // la carga directa siempre la hace un admin
  save();toast(completa?"🕰️ Corregido — la versión anterior quedó en el historial":"Resultado cargado ✓");render();
}

function mergePlayers(keep,dup){
  if(!keep||!dup||keep===dup)return;
  eachFechaArr(DATA).forEach(arr=>arr.forEach(f=>{
    f.parejas=f.parejas.map(t=>{const r=t.map(n=>n===dup?keep:n);return r.filter((n,i)=>r.indexOf(n)===i);});
    if(f.campeon){f.campeon=f.campeon.map(n=>n===dup?keep:n).filter((n,i,a)=>a.indexOf(n)===i);}
    if(f.pala){f.pala=f.pala.map(n=>n===dup?keep:n).filter((n,i,a)=>a.indexOf(n)===i);}
    if(f.mvp===dup)f.mvp=keep;
    if(f.sinCafe){f.sinCafe=f.sinCafe.map(n=>n===dup?keep:n).filter((n,i,a)=>a.indexOf(n)===i);}
  }));
  const kI=DATA.jugadores.findIndex(j=>j.n===keep), dI=DATA.jugadores.findIndex(j=>j.n===dup);
  if(dI>=0&&kI>=0)DATA.jugadores.splice(dI,1);
  else if(dI>=0&&kI<0)DATA.jugadores[dI].n=keep;
  if(DATA.bolsa)DATA.bolsa=DATA.bolsa.filter(n=>n!==dup);
  if(DATA.bolsaCop)delete DATA.bolsaCop[dup];
  save();
}
function renameInData(d,old,neu){
  (d.jugadores||[]).forEach(j=>{if(j.n===old)j.n=neu;});
  eachFechaArr(d).forEach(arr=>arr.forEach(f=>{
    f.parejas=f.parejas.map(t=>t.map(n=>n===old?neu:n));
    if(f.campeon)f.campeon=f.campeon.map(n=>n===old?neu:n);
    if(f.pala)f.pala=f.pala.map(n=>n===old?neu:n);
    if(f.mvp===old)f.mvp=neu;
    if(f.sinCafe)f.sinCafe=f.sinCafe.map(n=>n===old?neu:n);
  }));
  if(d.bolsa)d.bolsa=d.bolsa.map(n=>n===old?neu:n);
  if(d.bolsaCop&&d.bolsaCop[old]!==undefined){d.bolsaCop[neu]=d.bolsaCop[old];delete d.bolsaCop[old];}
  return d;
}
function normalizeData(d){
  RENOMBRES.forEach(([o,n])=>{ if(d&&d.jugadores&&d.jugadores.some(j=>j.n===o)&&!d.jugadores.some(j=>j.n===n)) renameInData(d,o,n); });
  return d;
}

function proxJuego(){ // próximo domingo 8:30 (si el de hoy ya se jugó, el que viene)

function rachaActualDe(n){ let r=0; for(const f of DATA.fechas){ if(f.parejas.some(t=>t.includes(n)))r++; else break; } return r; }
function rachasTop(){ // rachas vivas (jugó la última)
  if(!DATA.fechas.length)return [];
  return DATA.jugadores.map(j=>({n:j.n,r:rachaActualDe(j.n)})).filter(x=>x.r>=3).sort((a,b)=>b.r-a.r).slice(0,3);
}
function rachasRotas(){ // venía con racha de 3+ y faltó a la última fecha 💔
  if(DATA.fechas.length<2)return [];
  const ult=DATA.fechas[0], rotas=[];
  DATA.jugadores.forEach(j=>{
    if(ult.parejas.some(t=>t.includes(j.n)))return;
    let r=0; for(const f of DATA.fechas.slice(1)){ if(f.parejas.some(t=>t.includes(j.n)))r++; else break; }
    if(r>=3)rotas.push({n:j.n,r});
  });
  return rotas.sort((a,b)=>b.r-a.r).slice(0,2);
}
function ratingDe(n){ // rating simple: base por copón + historia (para el pronóstico)
  const ind=statsInd(allFechas())[n]||{camp:0,pala:0,mvp:0};
  const base={A:1200,B:1100,C:1000,D:900}[coponDe(n)]||1050;
  return base+28*(ind.camp||0)-14*(ind.pala||0)+6*(ind.mvp||0);
}
function probsKia(parejas){ // probabilidad de Kia por pareja (softmax del rating promedio)
  const rs=parejas.map(p=>p.reduce((a,n)=>a+ratingDe(n),0)/p.length);
  const ex=rs.map(r=>Math.exp(r/120));
  const s=ex.reduce((a,b)=>a+b,0);
  return ex.map(e=>Math.max(1,Math.round(e/s*100)));
}
function miProdeDe(f){ return USER?PRODE.find(x=>x.f===f&&x.uid===USER.uid):null; }
function tablaProde(){ // 🎯 ranking de adivinos
  const cerradas={}; allFechas().forEach(f=>{if(f.campeon)cerradas[f.f]=f.campeon;});
  const m={};
  PRODE.forEach(p=>{

    const who=p.jugador||p.nombre||"?";
    const o=m[who]||(m[who]={n:who,total:0,ok:0});
    o.total++;

  });
  const arr=Object.values(m).sort((a,b)=>b.ok-a.ok||a.total-b.total);

function duelosDe(name){ // ⚔️ por títulos del día: gano si salí campeón y vos no (jugando ambos)
  const m={};
  allFechas().forEach(f=>{
    if(!f.campeon)return;
    const my=f.parejas.find(p=>p.includes(name)); if(!my)return;
    const yoCamp=f.campeon.includes(name);
    f.parejas.forEach(p=>{ if(p===my)return; p.forEach(riv=>{
      const o=m[riv]||(m[riv]={w:0,l:0});
      if(yoCamp)o.w++;
      else if(f.campeon.some(x=>p.includes(x)))o.l++;
    });});
  });
  const arr=Object.entries(m).map(([n,v])=>({n,...v}));
  const victima=[...arr].filter(x=>x.w>=2).sort((a,b)=>b.w-a.w||a.l-b.l)[0];
  const verdugo=[...arr].filter(x=>x.l>=2).sort((a,b)=>b.l-a.l||a.w-b.w)[0];
  return {victima:victima||null,verdugo:verdugo||null};
}

function recuerdoSemanal(){ // 📸 un día como hoy (rota por semana entre fechas con foto)
  const mem=allFechas().filter(f=>f.campeon&&f.fotoKia);
  if(!mem.length)return null;
  const week=Math.floor(Date.now()/(7*86400000));
  const f=mem[week%mem.length];
  const meses=Math.max(1,Math.round((Date.now()-new Date(f.f+"T12:00:00"))/2629800000));
  return {f,meses};
}

function rachaMaxDe(fechas,n){
  let max=0,cur=0;
  [...fechas].sort((a,b)=>a.f.localeCompare(b.f)).forEach(f=>{
    if(f.parejas.some(t=>t.includes(n))){cur++;if(cur>max)max=cur;}else cur=0;
  });
  return max;
}
function premiosDe(fechas){
  const ind=Object.values(statsInd(fechas));
  const pares=Object.values(statsPar(fechas));
  const top=(arr,k)=>{const s=[...arr].sort((a,b)=>b[k]-a[k])[0];return s&&s[k]?s:null;};
  const p=[];
  const c=top(ind,"camp"); if(c)p.push(["🚗","Campeón del año",`${c.n} (${c.camp} Kia${c.camp===1?"":"s"})`]);
  const quim=[...pares].filter(x=>x.camp).sort((a,b)=>b.camp-a.camp||a.veces-b.veces)[0];
  if(quim)p.push(["💞","Pareja con más química",`${quim.a} & ${quim.b} (${quim.camp} título${quim.camp===1?"":"s"} en ${quim.veces} fecha${quim.veces===1?"":"s"} juntos)`]);
  const m=top(ind,"mvp"); if(m)p.push(["🎖️","MVP del año",`${m.n} (${m.mvp})`]);
  const pj=top(ind,"pj"); if(pj)p.push(["🔥","El más presente",`${pj.n} (${pj.pj} fechas)`]);
  let rn=null,rv=0; ind.forEach(x=>{const r=rachaMaxDe(fechas,x.n);if(r>rv){rv=r;rn=x.n;}});
  if(rn&&rv>=3)p.push(["⛓️","Racha de hierro",`${rn} (${rv} fechas seguidas sin faltar)`]);
  const pa=top(ind,"pala"); if(pa)p.push(["🥄","Cuchara de oro",`${pa.n} (${pa.pala})`]);
  const cf=top(ind,"cafe"); if(cf)p.push(["☕","Fana del cafecito",`${cf.n} (se quedó ${cf.cafe} ${cf.cafe===1?"vez":"veces"})`]);
  const rj=top(ind,"nocafe"); if(rj)p.push(["🏃","Rajador del año",`${rj.n} (se fue ${rj.nocafe} ${rj.nocafe===1?"vez":"veces"} sin café)`]);
  return p;
}

function buildRounds(teams){ // fixture todos-contra-todos (método del círculo)
  let list=teams.slice(); if(list.length%2)list.push(null);
  const R=Math.max(1,list.length-1), half=list.length/2; let arr=list.slice(); const rounds=[];
  for(let r=0;r<R;r++){
    const ms=[];
    for(let i=0;i<half;i++)ms.push([arr[i],arr[arr.length-1-i]]);
    rounds.push(ms.filter(m=>m[0]||m[1]));
    const fixed=arr[0], rest=arr.slice(1); rest.unshift(rest.pop()); arr=[fixed,...rest];
  }
  return rounds;
}
function seedHash(seedRaw){ let seed=0;for(let i=0;i<seedRaw.length;i++)seed=(seed*31+seedRaw.charCodeAt(i))|0; return seed>>>0; }
function draw(){
  const seedRaw=(document.getElementById("seed").value||"").trim();
  const msg=document.getElementById("drawMsg");
  if(!seedRaw){msg.innerHTML='<span class="warn">Poné un Nº de la suerte.</span>';return;}
  const rnd=mulberry32(seedHash(seedRaw));
  let all=[...SEL].map(n=>({n,c:coponDe(n),k:rnd()}));
  if(all.length<2){msg.innerHTML='<span class="warn">Marcá al menos 2 jugadores.</span>';document.getElementById("pairsOut").innerHTML="";return;}
  const rk=p=>{const i="ABCD".indexOf(p.c);return i>=0?i:1;}; // sin copón declarado = nivel B
  all.sort((a,b)=>rk(a)-rk(b)||a.k-b.k);
  let sup=null;
  if(all.length%2){sup=all.splice(Math.floor(all.length/2),1)[0];}
  // REGLA: el mejor disponible SIEMPRE con el más flojo disponible.
  // Así los A se llevan a los D y C, y los B quedan a lo sumo entre ellos.
  const pool=all.slice(), pairs=[];
  while(pool.length>=2)pairs.push([pool.shift(),pool.pop()]);
  const problemas=pairs.filter(([a,b])=>(a.c==="A"||b.c==="A")&&rk(a)<=1&&rk(b)<=1);
  const orden=shuffle(pairs,rnd); // orden de anuncio
  revelar(orden,{sup,problemas,seedRaw,manual:false});
}
function fechaConParejas(){ // la próxima fecha ya cargada (hoy o futura) con parejas definidas
  const h=new Date(), hoyS=h.getFullYear()+"-"+String(h.getMonth()+1).padStart(2,"0")+"-"+String(h.getDate()).padStart(2,"0");
  const cand=DATA.fechas.filter(f=>f.f>=hoyS&&f.parejas&&f.parejas.length>=2);
  return cand.length?cand[cand.length-1]:null; // la más cercana a hoy
}
function drawFixtureFecha(f){ // fixture de cruces y canchas con las parejas YA cargadas en la fecha
  if(!f)return;
  const seedEl=document.getElementById("seed"), msg=document.getElementById("drawMsg");
  if(!seedEl||!msg)return; // solo funciona parado en la vista Sorteo
  let seedRaw=(seedEl.value||"").trim();
  if(!seedRaw){seedRaw=String(1000+Math.floor(Math.random()*8999));seedEl.value=seedRaw;}
  const ci=document.getElementById("courts");
  if(ci)ci.value=Math.min(12,Math.max(1,Math.ceil(f.parejas.length/2)));
  const rnd=mulberry32(seedHash(seedRaw));
  const orden=shuffle(f.parejas.map(p=>p.map(n=>({n,c:coponDe(n)}))),rnd);
  revelar(orden,{sup:null,problemas:[],seedRaw,manual:true});
}
function drawManual(){ // parejas ya armadas a mano → solo se sortea el fixture
  const msg=document.getElementById("drawMsg");
  const pares=parsePairs(document.getElementById("manualPairs").value);
  if(pares.length<2){msg.innerHTML='<span class="warn">Pegá al menos 2 parejas (una por línea).</span>';return;}
  let seedRaw=(document.getElementById("seed").value||"").trim();
  if(!seedRaw){seedRaw=String(1000+Math.floor(Math.random()*8999));document.getElementById("seed").value=seedRaw;}
  const rnd=mulberry32(seedHash(seedRaw));
  const orden=shuffle(pares.map(p=>p.map(n=>({n,c:coponDe(n)}))),rnd);
  revelar(orden,{sup:null,problemas:[],seedRaw,manual:true});
}
function revelar(orden,{sup,problemas,seedRaw,manual}){
  const msg=document.getElementById("drawMsg");
  const courts=Math.max(1,parseInt(document.getElementById("courts").value)||1);

  // 🥁 bolillero con suspenso (más corto si las parejas ya se conocen)

  out.innerHTML=`<div class="card pad" style="text-align:center;margin-top:12px">
    <div style="font-size:44px">🥁</div>

  if(navigator.vibrate)navigator.vibrate([10,80,10,80,10,80,10]);
  const iv=setInterval(()=>{const el=document.getElementById("drumName");if(el)el.textContent=nombres[Math.floor(Math.random()*nombres.length)];},85);

  setTimeout(()=>{
    clearInterval(iv);
    if(navigator.vibrate)navigator.vibrate([15,40,15,40,80]);

      ?`Fixture sorteado con Nº <b>${esc(seedRaw)}</b> · ${orden.length} parejas (armadas a mano) · ${courts} canchas.`

    if(sup)baseMsg+=`<br><span class="warn">Impar:</span> ${esc(sup.n)} queda de suplente rotativo.`;
    if(orden.length>courts*2)baseMsg+=`<br><span class="warn">Ojo:</span> hay más parejas que lugares — algunas esperan turno.`;
    if(problemas.length)baseMsg+=`<br><span class="warn">⚠️ No alcanzan los C/D:</span> ${problemas.map(p=>`<b>${esc(p[0].n)} & ${esc(p[1].n)}</b>`).join(", ")} quedó como pareja fuerte. Recalificá copones en Admin o sumá un C/D.`;
    let selSwap=null, edited=false;

    const paint=(first)=>{ // pinta parejas + cruces; se re-ejecuta en cada intercambio
      LASTPAIRS=orden.map(p=>p.map(x=>x.n));
      const teams=orden.map((p,i)=>({id:i+1,label:p.map(x=>x.n).join(" & ")}));
      const rounds=buildRounds(teams);
      out.innerHTML=`
      <div class="pairwrap">${orden.map((p,i)=>`
        <div class="pcard" style="animation-delay:${first?(i*0.3).toFixed(1):0}s"><div class="no">${i+1}</div>
          ${p.map((x,j)=>`<div class="pl swapable" data-swap="${i}:${j}"><span class="cchip ${COL[x.c]||"ch0"}">${x.c||"·"}</span>${esc(x.n)}</div>`).join('<div class="amp">&</div>')}
        </div>`).join("")}
      </div>
      <div class="note" style="margin-top:8px;font-size:12px">✏️ ¿Quedó alguien mal parado? <b>Tocá un nombre y después otro</b> para intercambiarlos — los cruces se rearman solos.</div>
      <div class="card pad" style="margin-top:12px;${first?`animation:pop .45s ${(orden.length*0.3+0.2).toFixed(1)}s both`:""}">
        <div class="tag" style="margin-bottom:2px">🆚 Cruces por cancha</div>
        ${rounds.slice(0,3).map((ms,ri)=>`
          <div class="tag" style="color:var(--A);margin:10px 0 2px">Ronda ${ri+1}</div>
          ${ms.map((m,mi)=>m[0]&&m[1]
            ?`<div class="row" style="padding:6px 0"><span><b>${mi<courts?"Cancha "+(mi+1):"⏳ Espera"}:</b> ${esc(m[0].label)} <span style="color:var(--red2);font-family:'Anton',Impact,sans-serif"> VS </span> ${esc(m[1].label)}</span></div>`
            :`<div class="row" style="padding:6px 0"><span class="muted"><b>Libre:</b> ${esc((m[0]||m[1]).label)} descansa</span></div>`).join("")}`).join("")}
        ${rounds.length>3?`<div class="note" style="margin-top:8px">…y ${rounds.length-3} ronda${rounds.length-3===1?"":"s"} más si el cuerpo aguanta ☕</div>`:""}
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" id="sharePairs" style="flex:1">📲 Compartir</button>
        <button class="btn ghost" id="saveFecha" style="flex:1">💾 Guardar fecha</button>
      </div>`;
      out.querySelectorAll("[data-swap]").forEach(el=>el.onclick=()=>{
        const [i,j]=el.dataset.swap.split(":").map(Number);
        if(!selSwap){selSwap=[i,j];el.classList.add("swapsel");return;}
        const [i0,j0]=selSwap;

        const t=orden[i0][j0];orden[i0][j0]=orden[i][j];orden[i][j]=t;

        shareWA(txt);

        DATA.fechas.unshift({f,parejas:LASTPAIRS,campeon:null,pala:null,mvp:null});
        DATA.fechas.sort((a,b)=>b.f.localeCompare(a.f));
        save();
        toast(`📅 Fecha del ${fmtFecha(f)} guardada — después solo cargás el resultado`);
        go("inicio");

    };
    paint(true);
    msg.innerHTML=baseMsg;
  },manual?1100:1900);
}

}

function parsePairs(txt){
  return txt.split("\n").map(cleanLine).filter(l=>l&&!esEncabezado(l)&&!/^parejas/i.test(l)).map(l=>
    l.split(/\s*(?:,|\/|&|\+|-|–|—)\s*|\s+y\s+/i).map(s=>s.trim()).filter(Boolean)
      .map(s=>matchPlayer(s)||s)
  ).filter(p=>p.length>=2&&p.length<=3);
}
function parseDuo(s){const p=(s||"").split(",").map(x=>x.trim()).filter(Boolean);return p.length===2?p:null;}

/* ================= BIND ================= */
function bind(){
  document.querySelectorAll("[data-go2]").forEach(b=>b.onclick=()=>go(b.dataset.go2));
  document.querySelectorAll("[data-perfil]").forEach(b=>b.onclick=()=>go("perfil",b.dataset.perfil));

  if(VIEW==="inicio"){
    // ⏳ cuenta regresiva en vivo
    const tick=()=>{const el=document.getElementById("cdown");if(!el)return;
      const d=proxJuego().d.getTime()-Date.now();
      if(d<=0){el.textContent="🎾 ¡Se juega AHORA!";return;}
      const dd=Math.floor(d/86400000),hh=Math.floor(d%86400000/3600000),mm=Math.floor(d%3600000/60000),ss=Math.floor(d%60000/1000);
      el.textContent=`${dd>0?dd+"d ":""}${hh}h ${String(mm).padStart(2,"0")}m ${String(ss).padStart(2,"0")}s`;};
    tick();
    clearInterval(window.__cd);window.__cd=setInterval(tick,1000);
    // 🙋 anotarse / bajarse
    const ab=document.getElementById("asisBtn");
    if(ab)ab.onclick=async()=>{
      const pj=proxJuego();
      const yo=ASIS.find(a=>a.f===pj.f&&a.uid===USER.uid);
      try{
        if(yo){await deleteDoc(doc(db,"asistencia",`${pj.f}_${USER.uid}`));toast("😴 Te bajaste del domingo");}
        else{await setDoc(doc(db,"asistencia",`${pj.f}_${USER.uid}`),{f:pj.f,uid:USER.uid,nombre:(USER.displayName||USER.email||"?").split(" ")[0],jugador:MYPLAYER||null,ts:Date.now()});toast("🙋 ¡Anotado para el domingo!");}
      }catch(e){toast("⚠️ No se pudo (¿reglas actualizadas?)");}
    };

    const pr=document.getElementById("prodeBtn");

      const f=DATA.fechas[0]; if(!f||f.campeon)return;
      const v=await uiPick("🎲 ¿Quién se lleva el Kia?",`${fmtFecha(f.f)} · elegí tu pareja campeona (podés cambiarlo hasta el domingo)`,
        f.parejas.map((p,i)=>({label:`${i+1}) ${esc(p.join(" & "))} <small>🎯 ${probsKia(f.parejas)[i]}% según la historia</small>`,value:p})));
      if(v===undefined)return;
      try{
        await setDoc(doc(db,"prode",`${f.f}_${USER.uid}`),{f:f.f,uid:USER.uid,nombre:(USER.displayName||USER.email||"?").split(" ")[0],jugador:MYPLAYER||null,pareja:v,ts:Date.now()});
        toast("🎲 ¡Pronóstico jugado! Se resuelve el domingo");
      }catch(e){toast("⚠️ No se pudo guardar (¿reglas actualizadas?)");}
    };
    // 📊 compartir el dato del lunes
    const ds=document.getElementById("datoShare");
    if(ds)ds.onclick=()=>{const dato=datoSemanal();if(dato)shareWA(`📊 *EL DATO DEL LUNES* · Copones BV\n\n${dato.replace(/<[^>]+>/g,"")}\n\n👉 Toda la data: ${APP_URL}`);};
    const wa=document.getElementById("waShare");
    if(wa)wa.onclick=()=>{
      const f=DATA.fechas.find(x=>x.campeon)||DATA.fechas[0];
      shareWA(textoResultados(f,statsInd()));
    };
    const fb=document.getElementById("flyerBtn");
    if(fb)fb.onclick=()=>{
      const f=DATA.fechas.find(x=>x.campeon)||DATA.fechas[0];
      compartirFlyer(f,statsInd());
    };
    const h2=new Date(), hoy2=h2.getFullYear()+"-"+String(h2.getMonth()+1).padStart(2,"0")+"-"+String(h2.getDate()).padStart(2,"0");
    const fPend=DATA.fechas.find(x=>x.f<hoy2&&faltantesDe(x).length)||null;   // la última jugada con datos pendientes
    const fProx=(DATA.fechas[0]&&!DATA.fechas[0].campeon&&DATA.fechas[0].f>=hoy2)?DATA.fechas[0]:null;
    const proponer=async f=>{
      if(!f||!faltantesDe(f).length){toast("No hay nada pendiente de cargar");return;}
      if(!USER){toast("Primero ingresá con Google (🔑 arriba)");window.fbLogin();return;}
      const faltan=faltantesDe(f); // solo se pregunta lo que falta
      const dia=fmtFecha(f.f);
      const parejasOpt=f.parejas.map((p,i)=>({label:`${i+1}) ${esc(p.join(" & "))}`,value:p}));
      const jugadores=[...new Set(f.parejas.flat())];
      const prop={f:f.f,por:USER.email,ts:Date.now()};
      let cambios=0;
      if(faltan.includes("campeon")){
        const v=await uiPick("🚗 ¿Quién se llevó el Kia?",`${dia} · tocá la pareja campeona`,[...parejasOpt,{label:"🤷 No sé / no me acuerdo",value:null}]);
        if(v===undefined)return;
        if(v){prop.campeon=v;cambios++;}
      }
      if(faltan.includes("pala")){
        const v=await uiPick("🥄 ¿Cuchara de madera?",`${dia} · la pareja que la pasó peor`,[...parejasOpt,{label:"🤷 No sé",value:null}]);
        if(v===undefined)return;
        if(v){prop.pala=v;cambios++;}
      }
      if(faltan.includes("mvp")){
        const v=await uiPick("🎖️ ¿MVP del día?",`${dia} · el que la rompió`,[...jugadores.map(n=>({label:esc(n),value:n})),{label:"🤷 No sé",value:null}]);
        if(v===undefined)return;
        if(v){prop.mvp=v;cambios++;}
      }
      if(faltan.includes("cafe")){
        const v=await uiCafe("☕ ¿Quiénes se quedaron al café?",`${dia}`,jugadores,[]);
        if(v===undefined)return;
        prop.sinCafe=v;cambios++;
      }
      if(!cambios){toast("No cargaste ningún dato");return;}
      addDoc(collection(db,"propuestas"),prop)
        .then(()=>toast("📝 ¡Enviado! Le aparece al organizador en su Inicio para confirmarlo"))
        .catch(()=>toast("⚠️ No se pudo enviar (faltan las reglas nuevas)"));
    };
    const pb=document.getElementById("propBtn");
    if(pb)pb.onclick=()=>proponer(fPend);
    const pb2=document.getElementById("propBtn2");
    if(pb2)pb2.onclick=()=>proponer(fProx);
    const lr=document.getElementById("loadResBtn");
    if(lr)lr.onclick=()=>cargarResultado(fPend||DATA.fechas[0]);
    const fx=document.getElementById("fixtureBtn");
    if(fx)fx.onclick=()=>{go("sorteo");requestAnimationFrame(()=>drawFixtureFecha(fProx));};
  }

  if(VIEW==="jugadores"){
    const ps=document.getElementById("psearch");
    if(ps)ps.oninput=()=>{PQ=ps.value;document.getElementById("app").innerHTML=vJugadores();bind();const el=document.getElementById("psearch");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}};
  }

  if(VIEW==="ranking"){

  if(VIEW==="perfil"){
    const sh=document.getElementById("share");
    if(sh)sh.onclick=async()=>{
      const url=location.href.split("#")[0]+"#perfil="+encodeURIComponent(PARAM);

      const txt=`${PARAM} en Copones Buena Vista 🎾\n${ind.pj} fechas · ${ind.camp} 🏆 títulos\n${url}`;
      try{ if(navigator.share){await navigator.share({title:"Copones BV",text:txt,url});} else {await navigator.clipboard.writeText(txt);toast("Copiado al portapapeles");} }catch(e){}
    };
    const me=document.getElementById("meBtn");
    if(me)me.onclick=()=>{
      if(!USER){toast("Primero ingresá con Google (🔑 arriba)");window.fbLogin();return;}
      setDoc(doc(db,"usuarios",USER.uid),{email:USER.email,jugador:PARAM,vinculadoEl:Date.now()},{merge:true})

        .catch(()=>toast("⚠️ No se pudo vincular (faltan las reglas nuevas)"));
    };
  }

  if(VIEW==="sorteo"){
    if(!document.getElementById("seed").value)document.getElementById("seed").value=String(1000+Math.floor(Math.random()*8999));

    document.getElementById("btnDraw").onclick=draw;
    document.getElementById("seed").addEventListener("keydown",e=>{if(e.key==="Enter")draw();});
    document.getElementById("btnManual").onclick=drawManual;
    const bf=document.getElementById("btnFixFecha");
    if(bf)bf.onclick=()=>drawFixtureFecha(fechaConParejas());
    const bb=document.getElementById("bigBtn");
    const bigTxt=()=>{bb.textContent=BIGMODE?"📺 Modo pantalla: ON — el sorteo sale gigante":"📺 Modo pantalla: OFF";bb.style.borderColor=BIGMODE?"var(--A)":"";bb.style.color=BIGMODE?"var(--A)":"";};
    bigTxt();
    bb.onclick=()=>{BIGMODE=!BIGMODE;try{localStorage.setItem("cb_big",BIGMODE?"1":"0");}catch(e){}bigTxt();toast(BIGMODE?"📺 El próximo sorteo sale a pantalla completa":"Modo pantalla apagado");};
    const updCounts=()=>{
      document.getElementById("selcount").textContent=SEL.size;
      ["A","B","C","D"].forEach(c=>{const js=DATA.jugadores.filter(j=>j.c===c);const sel=js.filter(j=>SEL.has(j.n)).length;const el=document.getElementById("cnt-"+c);if(el)el.textContent=sel+"/"+js.length;});
      const loose=looseNames();const elS=document.getElementById("cnt-S");if(elS)elS.textContent=loose.filter(n=>SEL.has(n)).length+"/"+loose.length;
    };
    updCounts();

    const am=document.getElementById("asisMark");
    if(am)am.onclick=()=>{ // 🙋 marca a los anotados de la app

    document.getElementById("selNone").onclick=()=>{SEL.clear();route("sorteo");};
    const addSorp=async()=>{
      const inp=document.getElementById("newsorp");const v=inp.value.trim();if(!v)return;
      if(allKnownNames().includes(v)){toast("Ese nombre ya existe");return;}
      const c=await pedirCopon(v);
      (DATA.bolsa||(DATA.bolsa=[])).push(v);
      (DATA.bolsaCop||(DATA.bolsaCop={}))[v]=c;
      SEL.add(v);save();route("sorteo");
      toast(`🎁 ${v} agregado como copón ${c}`);
    };
    document.getElementById("addsorp").onclick=addSorp;
    document.getElementById("newsorp").addEventListener("keydown",e=>{if(e.key==="Enter")addSorp();});
    document.getElementById("parseList").onclick=async()=>{
      const txt=document.getElementById("pasteList").value;
      if(!txt.trim()){toast("Pegá la lista primero");return;}
      const noRec=[]; let ok=0;
      txt.split("\n").map(cleanLine).forEach(l=>{
        if(esEncabezado(l))return;
        const m=matchPlayer(l);
        if(m){SEL.add(m);ok++;}
        else noRec.push(l);
      });
      if(noRec.length&&await uiConfirm(`✨ Reconocí ${ok} jugador${ok===1?"":"es"}`,`No reconocí a: <b>${esc(noRec.join(", "))}</b>.<br><br>¿Los agrego como jugadores sorpresa? Te pregunto el copón de cada uno.`,"🎁 Sí, agregalos","No, dejalos afuera")){
        DATA.bolsa=DATA.bolsa||[];DATA.bolsaCop=DATA.bolsaCop||{};
        for(const n of noRec){
          if(!allKnownNames().includes(n)){DATA.bolsa.push(n);DATA.bolsaCop[n]=await pedirCopon(n);}
          SEL.add(n);
        }
        save();
      }
      const dm=txt.match(/(\d{1,2})\/(\d{1,2})/);
      if(dm&&+dm[1]>=1&&+dm[1]<=31&&+dm[2]>=1&&+dm[2]<=12){
        let y=new Date().getFullYear();
        let iso=y+"-"+String(+dm[2]).padStart(2,"0")+"-"+String(+dm[1]).padStart(2,"0");
        const hoy=new Date().toISOString().slice(0,10);
        if(iso<hoy){ // si ya pasó hace mucho, era del año que viene
          const dif=(new Date(hoy)-new Date(iso))/86400000;
          if(dif>60)iso=(y+1)+iso.slice(4);
        }
        SORTEO_FECHA=iso;
      }else{SORTEO_FECHA=null;}
      route("sorteo");
      toast(`✨ ${SEL.size} presentes marcados`);
      resumenConvocados(true);

    document.querySelectorAll("[data-deladmin]").forEach(b=>b.onclick=()=>{
      if(!confirm(`¿Quitar los permisos de admin a ${b.dataset.deladmin}?`))return;
      deleteDoc(doc(db,"admins",b.dataset.deladmin)).then(()=>toast("Quitado")).catch(()=>toast("⚠️ No se pudo"));
    });
    const ct=document.getElementById("cerrarTemp");
    if(ct)ct.onclick=()=>{
      if(!DATA.fechas.length){toast("No hay fechas para cerrar");return;}
      const nombre=prompt("Nombre de la temporada a cerrar:","Temporada 2026");
      if(!nombre)return;
      if(!confirm(`🏁 ¿Cerrar "${nombre.trim()}" con ${DATA.fechas.length} fechas?\n\nEl ranking actual arranca de cero y la temporada queda guardada en el historial.`))return;
      DATA.historial=DATA.historial||[];
      const cerrada={nombre:nombre.trim(),fechas:DATA.fechas};
      DATA.historial.push(cerrada);
      DATA.fechas=[];
      save();toast("🏁 Temporada cerrada");render();
      mostrarGala(cerrada.nombre,cerrada.fechas); // 🎉 la gala de despedida
    };
    document.querySelectorAll("[data-gala]").forEach(b=>b.onclick=()=>{
      const t=(DATA.historial||[])[+b.dataset.gala]; if(t)mostrarGala(t.nombre,t.fechas);
    });
    const gn=document.getElementById("galaNow");
    if(gn)gn.onclick=()=>mostrarGala("Temporada en curso",DATA.fechas);
    const br=document.getElementById("btnRen");
    if(br)br.onclick=()=>{
      const old=document.getElementById("renSel").value, neu=document.getElementById("renNew").value.trim();
      if(!old||!neu){toast("Completá jugador y nuevo nombre");return;}
      if(allKnownNames().includes(neu)){toast("Ese nombre ya existe — usá Unir");return;}
      if(!confirm(`¿Renombrar "${old}" a "${neu}" en todo el historial?`))return;
      renameInData(DATA,old,neu);save();toast(`${old} → ${neu} ✓`);render();
    };
    const bm=document.getElementById("btnMerge");
    if(bm)bm.onclick=()=>{
      const keep=document.getElementById("mergeKeep").value, dup=document.getElementById("mergeDup").value;
      if(!keep||!dup){toast("Elegí los dos nombres");return;}
      if(keep===dup){toast("Son el mismo nombre");return;}
      if(!confirm(`¿Unir "${dup}" dentro de "${keep}"?\n\nTodas las fechas, Kias, cucharas y MVP de "${dup}" pasan a "${keep}" y "${dup}" desaparece.\n\nEsto no se puede deshacer.`))return;
      mergePlayers(keep,dup);toast(`${dup} → ${keep} ✓`);render();
    };
    document.querySelectorAll("[data-alta]").forEach(b=>b.onclick=()=>{
      const n=b.dataset.alta;
      const sel=document.querySelector(`select[data-altacop="${CSS.escape(n)}"]`);
      const c=sel&&sel.value?sel.value:"";
      if(!c&&!confirm(`No elegiste copón para ${n}. ¿Darlo de alta igual como invitado sin copón?`))return;
      DATA.jugadores.push({n,c,real:"ex invitado sorpresa"});
      if(DATA.bolsa)DATA.bolsa=DATA.bolsa.filter(x=>x!==n);
      if(DATA.bolsaCop)delete DATA.bolsaCop[n];
      save();toast(n+" dado de alta como jugador estable ✓");render();
    });
    document.getElementById("addFecha").onclick=()=>{
      const f=document.getElementById("afecha").value;
      const pares=parsePairs(document.getElementById("apar").value);
      if(!f||!pares.length){toast("Falta fecha o parejas");return;}
      const mvpVal=document.getElementById("amvp").value.trim();
      const nueva={f,parejas:pares,campeon:parseDuo(document.getElementById("acamp").value),pala:parseDuo(document.getElementById("apala").value),mvp:mvpVal||null};
      // el dato del café solo se registra si hay resultado o si se anotó a alguien (una fecha futura no suma cafés)
      const cafeTxt=document.getElementById("acafe").value;
      if(cafeTxt.trim()||nueva.campeon)nueva.sinCafe=parseCafe(cafeTxt);
      if(nueva.campeon)nueva.confirmada=true; // la carga la hace un admin
      DATA.fechas.unshift(nueva);
      DATA.fechas.sort((a,b)=>b.f.localeCompare(a.f));
      save();toast("Fecha agregada");render();
    };
    document.querySelectorAll("[data-delf]").forEach(b=>b.onclick=async()=>{
      const f=DATA.fechas[+b.dataset.delf]; if(!f)return;
      if(!await uiConfirm("🗑️ ¿Borrar esta fecha?",`La del <b>${fmtFecha(f.f)}</b> (${f.parejas.length} parejas). Esto no se puede deshacer.`,"🗑️ Sí, borrala"))return;
      DATA.fechas.splice(+b.dataset.delf,1);save();render();
    });
    document.querySelectorAll("[data-editcamp]").forEach(b=>b.onclick=()=>cargarResultado(DATA.fechas[+b.dataset.editcamp]));
    document.querySelectorAll("[data-hist]").forEach(b=>b.onclick=()=>{
      const f=DATA.fechas[+b.dataset.hist]; if(!f||!f.versiones)return;
      const lineas=[...f.versiones].reverse().map(v=>{
        const d=new Date(v.ts), t=`${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        const a=v.antes||{};
        return `<div class="mopt" style="cursor:default"><b>${t}</b> · lo cambió ${esc(v.por)}<small>Decía: 🚗 ${a.campeon?esc(a.campeon.join(" & ")):"—"} · 🥄 ${a.pala?esc(a.pala.join(" & ")):"—"} · 🎖️ ${a.mvp?esc(a.mvp):"—"} · ☕ ${Array.isArray(a.sinCafe)?(a.sinCafe.length?"se rajaron "+esc(a.sinCafe.join(", ")):"se quedaron todos"):"—"}</small></div>`;
      });
      const d=uiShow(`🕰️ Historial de cambios`,`Fecha del ${fmtFecha(f.f)} · la versión vigente es la que se ve en la app`,lineas.join("")+`<button class="mcancel" data-x>Cerrar</button>`);
      d.querySelector("[data-x]").onclick=uiClose;
      d.onclick=e=>{if(e.target===d)uiClose();};
    });
    document.querySelectorAll("[data-cop]").forEach(s=>s.onchange=()=>{DATA.jugadores[+s.dataset.cop].c=s.value;save();});
    document.querySelectorAll("[data-delj]").forEach(b=>b.onclick=async()=>{
      const j=DATA.jugadores[+b.dataset.delj]; if(!j)return;
      if(!await uiConfirm(`🗑️ ¿Sacar a ${esc(j.n)} del plantel?`,"Su historial de fechas no se borra: va a aparecer como jugador sorpresa.","🗑️ Sí, sacalo"))return;
      DATA.jugadores.splice(+b.dataset.delj,1);save();render();
    });
    document.getElementById("addj").onclick=()=>{const v=document.getElementById("newj").value.trim();if(!v)return;DATA.jugadores.push({n:v,c:""});save();render();};
    document.getElementById("expData").onclick=()=>{const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="copones-datos.json";a.click();toast("Datos exportados ✓");};
    document.getElementById("copyData").onclick=async()=>{try{await navigator.clipboard.writeText(JSON.stringify(DATA,null,2));toast("Datos copiados");}catch(e){toast("No se pudo copiar");}};
    document.getElementById("impData").onclick=()=>document.getElementById("impFile").click();
    document.getElementById("impFile").onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.jugadores&&d.fechas){DATA=d;save();toast("Datos importados");render();}else toast("Archivo inválido");}catch(err){toast("Archivo inválido");}};r.readAsText(file);};
  }
}

/* ================= INIT ================= */
(function init(){
  const h=location.hash.slice(1);
  if(h){const [v,p]=h.split("=");VIEW=v||"inicio";PARAM=p?decodeURIComponent(p):null;}
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.go===VIEW));
  // tema claro/oscuro
  const applyTheme=t=>{document.body.classList.toggle("light",t==="light");document.getElementById("themeBtn").textContent=t==="light"?"☀️":"🌙";};
  let theme=localStorage.getItem("cb_theme")||"dark";
  applyTheme(theme);
  document.getElementById("themeBtn").onclick=()=>{theme=theme==="light"?"dark":"light";localStorage.setItem("cb_theme",theme);applyTheme(theme);};
  renderAuth();
  render();
})();
</script>
</body>
</html>
