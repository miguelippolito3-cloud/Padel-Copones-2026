  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(10,11,13,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}

  .toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#000;border:1px solid var(--line);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;font-size:14px;z-index:80;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
</style>

function save(){ try{localStorage.setItem(LS,JSON.stringify(DATA));}catch(e){} }
const COL={A:"chA",B:"chB",C:"chC",D:"chD","":"ch0"};

/* ================= HELPERS ================= */
function key(a,b){return [a,b].sort().join(" ‑ ");}
function coponDe(n){ const j=DATA.jugadores.find(x=>x.n===n); return j?j.c:""; }
function todosLosNombres(){
  const s=new Set(DATA.jugadores.map(j=>j.n));
  DATA.fechas.forEach(f=>f.parejas.forEach(p=>p.forEach(n=>s.add(n))));
  return [...s];
}
function statsInd(){
  const m={};
  const get=n=>m[n]||(m[n]={n,pj:0,camp:0,pala:0,comp:{}});
  DATA.fechas.forEach(f=>{
    const enFecha=new Set();
    f.parejas.forEach(([a,b])=>{
      enFecha.add(a);enFecha.add(b);
      get(a).comp[b]=(get(a).comp[b]||0)+1;
      get(b).comp[a]=(get(b).comp[a]||0)+1;
    });
    enFecha.forEach(n=>get(n).pj++);
    if(f.campeon){f.campeon.forEach(n=>get(n).camp++);}
    if(f.pala){f.pala.forEach(n=>get(n).pala++);}
  });
  return m;
}
function statsPar(){
  const m={};
  DATA.fechas.forEach(f=>{
    f.parejas.forEach(([a,b])=>{
      const k=key(a,b); const o=m[k]||(m[k]={a,b,veces:0,camp:0});
      o.veces++;
      if(f.campeon && key(f.campeon[0],f.campeon[1])===k) o.camp++;
    });
  });
  return m;
}
function initials(n){return n.replace(/[^A-Za-zÀ-ÿ ]/g,"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase()||"?";}
function avatarColor(n){const cols=["#e2102a","#2f7bff","#fb923c","#22c55e","#a78bfa","#f5c518","#ff5da2","#14b8a6"];let h=0;for(const ch of n)h=(h*31+ch.charCodeAt(0))>>>0;return cols[h%cols.length];}
function fmtFecha(s){const [y,m,d]=s.split("-");const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return `${+d} ${ms[+m-1]} ${y}`;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1800);}

/* ================= ROUTER ================= */
let VIEW="inicio", PARAM=null;
function route(v,p){ VIEW=v||"inicio";PARAM=p||null; document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.go===VIEW)); render(); window.scrollTo(0,0); }
function go(v,p){ const nh="#"+v+(p?("="+encodeURIComponent(p)):""); if(location.hash===nh){route(v,p);} else {location.hash=nh;} }
document.getElementById("nav").addEventListener("click",e=>{const a=e.target.closest("a");if(a)go(a.dataset.go);});
window.addEventListener("hashchange",()=>{ const h=location.hash.slice(1); const [v,p]=h.split("="); route(v||"inicio", p?decodeURIComponent(p):null); });

}

function renderTicker(){
  const ind=statsInd();
  const arr=Object.values(ind);
  const topJ=[...arr].sort((a,b)=>b.pj-a.pj)[0];
  const topC=[...arr].sort((a,b)=>b.camp-a.camp)[0];
  const ult=DATA.fechas[0];
  let bits=[];
  if(ult&&ult.campeon)bits.push(`<span class="rd">🏆 ÚLTIMO CAMPEÓN</span> ${esc(ult.campeon.join(" & "))}`);
  if(topC&&topC.camp)bits.push(`<span class="rd">👑 MÁS TÍTULOS</span> <b>${esc(topC.n)}</b> (${topC.camp})`);
  if(topJ)bits.push(`<span class="rd">🔥 MÁS PRESENTE</span> <b>${esc(topJ.n)}</b> (${topJ.pj} fechas)`);

  const line=bits.join(" &nbsp;•&nbsp; ");

/* ---------- SORTEO ---------- */
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function shuffle(arr,rnd){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let SEL=new Set(DATA.jugadores.filter(j=>j.c).map(j=>j.n)); // preselección: los que tienen copón
let LASTPAIRS=null;
function vSorteo(){
  const js=DATA.jugadores.slice().sort((a,b)=>("ABCD".indexOf(a.c||"Z"))-("ABCD".indexOf(b.c||"Z"))||a.n.localeCompare(b.n));
  return `<section>

    <div class="card pad">
      <div class="note" style="margin-top:0">Marcá quién juega hoy y apretá sortear. Regla: <b>uno de la mitad más fuerte con uno de la más floja</b>. El <b>Nº de la suerte</b> lo hace repetible y justo.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:end">
        <div class="field"><label>Nº de la suerte</label><input id="seed" inputmode="numeric" style="width:120px"></div>

        <button class="btn" id="btnDraw">🎾 Sortear</button>
        <button class="btn ghost sm" id="btnSeed">Otro Nº</button>
      </div>
    </div>

    <div class="card pad" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="tag">Presentes (<span id="selcount">${SEL.size}</span>)</div>
        <div><button class="btn ghost sm" id="selAll">Todos</button> <button class="btn ghost sm" id="selNone">Ninguno</button></div>
      </div>
      <div id="checklist">${js.map(j=>`
        <label class="adline" style="cursor:pointer">
          <input type="checkbox" data-sel="${esc(j.n)}" ${SEL.has(j.n)?"checked":""} style="width:auto">
          <span class="an">${esc(j.n)}</span>
          <span class="cchip ${COL[j.c]}">${j.c||"·"}</span>
        </label>`).join("")}
      </div>
    </div>

    <div id="drawMsg" class="note" style="margin-top:10px"></div>
    <div id="pairsOut"></div>
  </section>`;
}
function draw(){
  const seedRaw=(document.getElementById("seed").value||"").trim();
  const msg=document.getElementById("drawMsg");
  if(!seedRaw){msg.innerHTML='<span class="warn">Poné un Nº de la suerte.</span>';return;}
  let seed=0;for(let i=0;i<seedRaw.length;i++)seed=(seed*31+seedRaw.charCodeAt(i))|0;
  const rnd=mulberry32(seed>>>0);
  let all=[...SEL].map(n=>({n,c:coponDe(n)}));
  if(all.length<2){msg.innerHTML='<span class="warn">Marcá al menos 2 jugadores.</span>';document.getElementById("pairsOut").innerHTML="";return;}
  const rankC=c=>("ABCD".indexOf(c)>=0?"ABCD".indexOf(c):2.5); // sin copón = medio
  all=all.map(p=>({...p,k:rnd()})).sort((a,b)=>rankC(a.c)-rankC(b.c)||a.k-b.k);
  let sup=null;
  if(all.length%2){sup=all.splice(Math.floor(all.length/2),1)[0];}
  const half=all.length/2;
  const fuertes=shuffle(all.slice(0,half),rnd), flojos=shuffle(all.slice(half),rnd);
  const pairs=[];for(let i=0;i<half;i++)pairs.push([fuertes[i],flojos[i]]);
  LASTPAIRS=pairs.map(p=>[p[0].n,p[1].n]);
  const courts=Math.max(1,parseInt(document.getElementById("courts").value)||1);
  document.getElementById("pairsOut").innerHTML=`
    <div class="pairwrap">${pairs.map((p,i)=>`
      <div class="pcard"><div class="no">${i+1}</div>
        <div class="pl"><span class="cchip ${COL[p[0].c]}">${p[0].c||"·"}</span>${esc(p[0].n)}</div>
        <div class="amp">&</div>
        <div class="pl"><span class="cchip ${COL[p[1].c]}">${p[1].c||"·"}</span>${esc(p[1].n)}</div>
      </div>`).join("")}
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" id="sharePairs" style="flex:1">📲 Compartir parejas</button>
      <button class="btn ghost" id="saveFecha" style="flex:1">💾 Guardar fecha</button>
    </div>`;
  let m=`Sorteo con Nº <b>${esc(seedRaw)}</b> · ${pairs.length} parejas · ${courts} canchas.`;
  if(sup)m+=`<br><span class="warn">Impar:</span> ${esc(sup.n)} queda de suplente rotativo.`;
  else if(pairs.length>courts)m+=`<br><span class="warn">Ojo:</span> hay ${pairs.length} parejas y ${courts} canchas — algunas esperan turno.`;
  msg.innerHTML=m;
  document.getElementById("sharePairs").onclick=async()=>{
    const txt="🎾 PAREJAS DEL DOMINGO · Copones Buena Vista\n\n"+LASTPAIRS.map((p,i)=>`${i+1}) ${p[0]} & ${p[1]}`).join("\n")+`\n\nSorteo transparente · Nº ${seedRaw}`;
    try{ if(navigator.share){await navigator.share({title:"Parejas del domingo",text:txt});} else {await navigator.clipboard.writeText(txt);toast("Parejas copiadas");} }catch(e){}
  };
  document.getElementById("saveFecha").onclick=()=>{
    const hoy=new Date().toISOString().slice(0,10);
    DATA.fechas.unshift({f:hoy,parejas:LASTPAIRS,campeon:null,pala:null});
    save();toast("Fecha guardada");go("admin");
  };
}

      <div class="note" style="margin-bottom:10px">Para que <b>todos vean el mismo ranking</b>, exportá los datos y reemplazá el bloque <b>SEED</b> del archivo <b>index.html</b> en GitHub. Así queda publicado para todos.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn sm" id="expData">⬇️ Exportar datos (JSON)</button>
        <button class="btn ghost sm" id="copyData">📋 Copiar</button>
        <button class="btn ghost sm" id="impData">⬆️ Importar</button>
        <button class="btn ghost sm" id="resetData">♻️ Restaurar</button>
      </div>
      <input id="impFile" type="file" accept="application/json" class="hidden">
    </div>
  </section>`;
}
function parsePairs(txt){
  return txt.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>l.split(",").map(s=>s.trim()).filter(Boolean)).filter(p=>p.length===2);
}
function parseDuo(s){const p=(s||"").split(",").map(x=>x.trim()).filter(Boolean);return p.length===2?p:null;}

/* ================= BIND ================= */
function bind(){
  document.querySelectorAll("[data-go2]").forEach(b=>b.onclick=()=>go(b.dataset.go2));
  document.querySelectorAll("[data-perfil]").forEach(b=>b.onclick=()=>go("perfil",b.dataset.perfil));

  if(VIEW==="ranking"){
    document.querySelectorAll("#rkseg button").forEach(b=>b.onclick=()=>{RKTAB=b.dataset.t;document.getElementById("rktable").innerHTML=RKTAB==='jug'?tablaJug():tablaPar();document.querySelectorAll("#rkseg button").forEach(x=>x.classList.toggle("on",x.dataset.t===RKTAB));bind();});
  }

  if(VIEW==="perfil"){
    const sh=document.getElementById("share");
    if(sh)sh.onclick=async()=>{
      const url=location.href.split("#")[0]+"#perfil="+encodeURIComponent(PARAM);
      const ind=statsInd()[PARAM]||{pj:0,camp:0};
      const txt=`${PARAM} en Copones Buena Vista 🎾\n${ind.pj} fechas · ${ind.camp} 🏆 títulos\n${url}`;
      try{ if(navigator.share){await navigator.share({title:"Copones BV",text:txt,url});} else {await navigator.clipboard.writeText(txt);toast("Copiado al portapapeles");} }catch(e){}
    };
  }

  if(VIEW==="sorteo"){
    if(!document.getElementById("seed").value)document.getElementById("seed").value=String(1000+Math.floor(Math.random()*8999));
    document.getElementById("btnSeed").onclick=()=>{document.getElementById("seed").value=String(1000+Math.floor(Math.random()*8999));};
    document.getElementById("btnDraw").onclick=draw;
    document.querySelectorAll("[data-sel]").forEach(cb=>cb.onchange=()=>{cb.checked?SEL.add(cb.dataset.sel):SEL.delete(cb.dataset.sel);document.getElementById("selcount").textContent=SEL.size;});
    document.getElementById("selAll").onclick=()=>{DATA.jugadores.forEach(j=>SEL.add(j.n));render();go("sorteo");};
    document.getElementById("selNone").onclick=()=>{SEL.clear();render();go("sorteo");};
  }

  if(VIEW==="admin"){
    document.getElementById("addFecha").onclick=()=>{
      const f=document.getElementById("afecha").value;
      const pares=parsePairs(document.getElementById("apar").value);
      if(!f||!pares.length){toast("Falta fecha o parejas");return;}
      DATA.fechas.unshift({f,parejas:pares,campeon:parseDuo(document.getElementById("acamp").value),pala:parseDuo(document.getElementById("apala").value)});
      DATA.fechas.sort((a,b)=>b.f.localeCompare(a.f));
      save();toast("Fecha agregada");render();
    };
    document.querySelectorAll("[data-delf]").forEach(b=>b.onclick=()=>{DATA.fechas.splice(+b.dataset.delf,1);save();render();});
    document.querySelectorAll("[data-editcamp]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.editcamp,f=DATA.fechas[i];
      const opciones=f.parejas.map((p,idx)=>`${idx+1}) ${p.join(" & ")}`).join("\n");
      const r=prompt("¿Qué pareja fue campeona? Escribí el número:\n"+opciones+"\n(0 = sin campeón)");
      if(r===null)return;const idx=parseInt(r)-1;
      f.campeon=(idx>=0&&idx<f.parejas.length)?f.parejas[idx]:null;
      save();toast("Actualizado");render();
    });
    document.querySelectorAll("[data-cop]").forEach(s=>s.onchange=()=>{DATA.jugadores[+s.dataset.cop].c=s.value;save();});
    document.querySelectorAll("[data-delj]").forEach(b=>b.onclick=()=>{DATA.jugadores.splice(+b.dataset.delj,1);save();render();});
    document.getElementById("addj").onclick=()=>{const v=document.getElementById("newj").value.trim();if(!v)return;DATA.jugadores.push({n:v,c:""});save();render();};
    document.getElementById("expData").onclick=()=>{const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="copones-datos.json";a.click();toast("Datos exportados ✓");};
    document.getElementById("copyData").onclick=async()=>{try{await navigator.clipboard.writeText(JSON.stringify(DATA,null,2));toast("Datos copiados");}catch(e){toast("No se pudo copiar");}};
    document.getElementById("impData").onclick=()=>document.getElementById("impFile").click();
    document.getElementById("impFile").onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.jugadores&&d.fechas){DATA=d;save();toast("Datos importados");render();}else toast("Archivo inválido");}catch(err){toast("Archivo inválido");}};r.readAsText(file);};
    document.getElementById("resetData").onclick=()=>{if(confirm("¿Restaurar los datos originales? Se pierden tus cambios locales.")){DATA=JSON.parse(JSON.stringify(SEED));save();render();}};
  }
}

/* ================= INIT ================= */
(function init(){
  const h=location.hash.slice(1);
  if(h){const [v,p]=h.split("=");VIEW=v||"inicio";PARAM=p?decodeURIComponent(p):null;}
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.go===VIEW));
  render();
})();
</script>
