# Backup automático de la base de datos (Firestore) al repo.
# Corre todos los lunes a las 9:00 de Argentina (12:00 UTC) y también
# se puede disparar a mano desde la pestaña Actions → "Run workflow".
name: Backup semanal de la nube

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Descargar datos de Firestore
        run: |
          mkdir -p backups
          curl -sf "https://firestore.googleapis.com/v1/projects/padel-copones/databases/(default)/documents/app/data" -o /tmp/doc.json
          python3 -c "import json; d=json.load(open('/tmp/doc.json')); open('/tmp/data.json','w').write(d['fields']['json']['stringValue'])"
          python3 -m json.tool /tmp/data.json > /dev/null   # valida que sea JSON sano antes de guardarlo
          cp /tmp/data.json "backups/backup-$(date +%F).json"

      - name: Commitear el backup (solo si cambió algo)
        run: |
          git config user.name "backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backups
          if git diff --cached --quiet; then
            echo "Los datos no cambiaron desde el último backup."
          else
            git commit -m "☁️ Backup automático $(date +%F)"
            git push
          fi
